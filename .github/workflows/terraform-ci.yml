name: Terraform CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "us-dev/**"
      - "us-dev-static/**"
      - "module/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "us-dev/**"
      - "us-dev-static/**"
      - "module/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_WORKING_DIR: us-dev

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [us-dev, us-dev-static]

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      # Truyền region qua -backend-config để không cần hardcode trong provider.tf
      - name: Terraform Init
        run: terraform init -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_db_username:             ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password:             ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret_key:          ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_cloudinary_api_key:      ${{ secrets.TF_VAR_CLOUDINARY_API_KEY }}
          TF_VAR_cloudinary_api_secret:   ${{ secrets.TF_VAR_CLOUDINARY_API_SECRET }}
          TF_VAR_stripe_secret_key:       ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key:  ${{ secrets.TF_VAR_STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret:   ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_cloudinary_cloud_name:   ${{ vars.TF_VAR_CLOUDINARY_CLOUD_NAME }}
          TF_VAR_github_repo_owner:       ${{ vars.TF_VAR_GITHUB_REPO_OWNER }}
          TF_VAR_github_repo_name:        ${{ vars.TF_VAR_GITHUB_REPO_NAME }}
          TF_VAR_github_branch:           ${{ vars.TF_VAR_GITHUB_BRANCH }}
          TF_VAR_backend_desired_count:   ${{ vars.TF_VAR_BACKEND_DESIRED_COUNT }}
          TF_VAR_db_multi_az:             ${{ vars.TF_VAR_DB_MULTI_AZ }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_db_username:             ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password:             ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret_key:          ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_cloudinary_api_key:      ${{ secrets.TF_VAR_CLOUDINARY_API_KEY }}
          TF_VAR_cloudinary_api_secret:   ${{ secrets.TF_VAR_CLOUDINARY_API_SECRET }}
          TF_VAR_stripe_secret_key:       ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key:  ${{ secrets.TF_VAR_STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret:   ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_cloudinary_cloud_name:   ${{ vars.TF_VAR_CLOUDINARY_CLOUD_NAME }}
          TF_VAR_github_repo_owner:       ${{ vars.TF_VAR_GITHUB_REPO_OWNER }}
          TF_VAR_github_repo_name:        ${{ vars.TF_VAR_GITHUB_REPO_NAME }}
          TF_VAR_github_branch:           ${{ vars.TF_VAR_GITHUB_BRANCH }}
          TF_VAR_backend_desired_count:   ${{ vars.TF_VAR_BACKEND_DESIRED_COUNT }}
          TF_VAR_db_multi_az:             ${{ vars.TF_VAR_DB_MULTI_AZ }}
