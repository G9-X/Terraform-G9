name: Terraform CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "us-dev/**"
      - "us-dev-static/**"
      - "module/**"
      - ".github/workflows/terraform-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "us-dev/**"
      - "us-dev-static/**"
      - "module/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_WORKING_DIR: us-dev
  TF_VAR_create_github_oidc_provider: false
  TF_VAR_existing_github_oidc_provider_arn: ${{ vars.TF_VAR_EXISTING_GITHUB_OIDC_PROVIDER_ARN }}

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [us-dev, us-dev-static]

    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      # Tạo S3 bucket + DynamoDB table nếu chưa tồn tại (account reset hàng tuần)
      - name: Bootstrap Terraform Backend
        run: |
          BUCKET_NAME="xbrain-terraform-state"
          TABLE_NAME="terraform-state-lock"
          REGION="${{ env.AWS_REGION }}"

          # Tạo S3 bucket nếu chưa có
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            aws s3api put-public-access-block \
              --bucket "$BUCKET_NAME" \
              --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          else
            echo "S3 bucket $BUCKET_NAME already exists"
          fi

          # Tạo DynamoDB table nếu chưa có
          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" --region "$REGION" 2>/dev/null; then
            echo "Creating DynamoDB table: $TABLE_NAME"
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$REGION"

            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$REGION"
          else
            echo "DynamoDB table $TABLE_NAME already exists"
          fi

      # Truyền region qua -backend-config để không cần hardcode trong provider.tf
      - name: Terraform Init
        run: terraform init -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_db_username:             ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password:             ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret_key:          ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_cloudinary_api_key:      ${{ secrets.TF_VAR_CLOUDINARY_API_KEY }}
          TF_VAR_cloudinary_api_secret:   ${{ secrets.TF_VAR_CLOUDINARY_API_SECRET }}
          TF_VAR_stripe_secret_key:       ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key:  ${{ secrets.TF_VAR_STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret:   ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_cloudinary_cloud_name:   ${{ vars.TF_VAR_CLOUDINARY_CLOUD_NAME }}
          TF_VAR_github_repo_owner:       ${{ vars.TF_VAR_GITHUB_REPO_OWNER }}
          TF_VAR_github_repo_name:        ${{ vars.TF_VAR_GITHUB_REPO_NAME }}
          TF_VAR_github_branch:           ${{ vars.TF_VAR_GITHUB_BRANCH }}
          TF_VAR_backend_desired_count:   ${{ vars.TF_VAR_BACKEND_DESIRED_COUNT }}
          TF_VAR_db_multi_az:             ${{ vars.TF_VAR_DB_MULTI_AZ }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_db_username:             ${{ secrets.TF_VAR_DB_USERNAME }}
          TF_VAR_db_password:             ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_jwt_secret_key:          ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_cloudinary_api_key:      ${{ secrets.TF_VAR_CLOUDINARY_API_KEY }}
          TF_VAR_cloudinary_api_secret:   ${{ secrets.TF_VAR_CLOUDINARY_API_SECRET }}
          TF_VAR_stripe_secret_key:       ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key:  ${{ secrets.TF_VAR_STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret:   ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_cloudinary_cloud_name:   ${{ vars.TF_VAR_CLOUDINARY_CLOUD_NAME }}
          TF_VAR_github_repo_owner:       ${{ vars.TF_VAR_GITHUB_REPO_OWNER }}
          TF_VAR_github_repo_name:        ${{ vars.TF_VAR_GITHUB_REPO_NAME }}
          TF_VAR_github_branch:           ${{ vars.TF_VAR_GITHUB_BRANCH }}
          TF_VAR_backend_desired_count:   ${{ vars.TF_VAR_BACKEND_DESIRED_COUNT }}
          TF_VAR_db_multi_az:             ${{ vars.TF_VAR_DB_MULTI_AZ }}
